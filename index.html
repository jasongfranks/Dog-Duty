<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dog Duty</title>
  <style>
    /* Adding a specific style for the admin button */
    .admin-btn { background: #4527a0 !important; margin-top: 10px; }
    .family-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
  </style>
</head>
<body>

<div id="supplyBanner"></div>

<main id="appContent">
  <header>
    <div class="brand-area">
      <img src="logo.png" alt="Logo">
      <h1>DOG DUTY</h1>
      <span id="syncStatus">Syncing...</span>
    </div>
    <div class="header-controls">
      <div class="icon-btn" onclick="confirmSignOut()">👤 <span id="userNameDisplay">...</span></div>
    </div>
  </header>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div class="section-label">Routine</div>
    <div style="font-size:12px; color:#0277bd; cursor:pointer; margin-right:10px;" onclick="openManageRoutineModal()">⚙️ Edit</div>
  </div>
  <div id="routineButtons" class="list-container"></div>

  <div class="section-label">Walks</div>
  <div id="walkList" class="list-container"></div>
  <button class="add-walk-btn" onclick="openWalkModal()">＋ Add Walk</button>

  <div style="margin-top:30px; border-top: 1px solid #333; padding-top:20px;">
    <button class="action-btn secondary" onclick="openSupplyModal()">📦 Manage Supplies</button>
    <button class="action-btn secondary" style="background:#455a64; margin-top:10px;" onclick="openHistoryModal()">📅 View History</button>
    <button id="adminBtn" class="action-btn admin-btn" style="display:none;" onclick="openAdminModal()">👨‍👩‍👧‍👦 Manage Family</button>
  </div>
  <div class="version-label" onclick="window.location.reload(true)">Version 1.2.3</div>
</main>

<div id="adminModal" class="modal">
  <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
    <h2>Family Allowlist</h2>
    <div id="familyList" style="text-align: left; margin-bottom: 20px;"></div>
    
    <div style="border-top: 1px solid #333; padding-top: 15px;">
      <input type="email" id="newFamilyEmail" placeholder="new.member@gmail.com" style="width:100%; padding:15px; border-radius:10px; border:none; background:#333; color:white; margin-bottom:10px;">
      <button class="action-btn" onclick="addFamilyMember()">Grant Access</button>
      <button class="action-btn secondary" onclick="closeAdminModal()">Close</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
  // CONFIG & INIT
  const firebaseConfig = { /* ... your config ... */ };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();
  
  const ADMIN_EMAIL = "jason.g.franks@gmail.com";
  let userFirstName = "";
  let activeWalks = [];
  let currentRoutines = [];
  const todayKey = new Date().toISOString().split('T')[0];

  // AUTH LOGIC
  auth.onAuthStateChanged(user => {
    if (user) {
      const email = user.email.toLowerCase();
      const safeEmail = email.replace(/\./g, ',');
      
      db.ref(`allowlist/${safeEmail}`).once('value').then(snap => {
        if (snap.exists()) {
          userFirstName = user.displayName ? user.displayName.split(' ')[0] : "User";
          document.getElementById('loginModal').style.display = 'none';
          document.getElementById('appContent').style.display = 'block';
          document.getElementById('userNameDisplay').textContent = userFirstName;
          
          // Show Admin button if it's you
          if (email === ADMIN_EMAIL) {
            document.getElementById('adminBtn').style.display = 'block';
          }
          
          init();
        } else { handleDenied("Not on allowlist."); }
      }).catch(() => handleDenied("Access Denied."));
    } else {
      document.getElementById('loginModal').style.display = 'flex';
      document.getElementById('appContent').style.display = 'none';
    }
  });

  function handleDenied(msg) { alert(msg); auth.signOut(); }

  // ADMIN PANEL LOGIC
  function openAdminModal() {
    document.getElementById('adminModal').style.display = 'flex';
    const list = document.getElementById('familyList');
    
    db.ref('allowlist').on('value', snap => {
      list.innerHTML = '';
      const members = snap.val() || {};
      Object.keys(members).forEach(safeEmail => {
        const displayEmail = safeEmail.replace(/,/g, '.');
        const row = document.createElement('div');
        row.className = 'family-row';
        row.innerHTML = `
          <span>${displayEmail}</span>
          ${displayEmail !== ADMIN_EMAIL ? `<button onclick="removeFamilyMember('${safeEmail}')" style="background:none; border:none; color:#ff5252; font-weight:bold; cursor:pointer;">REMOVE</button>` : '<i>Admin</i>'}
        `;
        list.appendChild(row);
      });
    });
  }

  function addFamilyMember() {
    const email = document.getElementById('newFamilyEmail').value.trim().toLowerCase();
    if (!email || !email.includes('@')) { alert("Invalid email"); return; }
    const safeEmail = email.replace(/\./g, ',');
    db.ref(`allowlist/${safeEmail}`).set(true).then(() => {
      document.getElementById('newFamilyEmail').value = '';
    });
  }

  function removeFamilyMember(safeEmail) {
    if (confirm(`Revoke access for ${safeEmail.replace(/,/g, '.')}?`)) {
      db.ref(`allowlist/${safeEmail}`).remove();
    }
  }

  function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

  // REPAIRED ADD ROUTINE LOGIC
  function addRoutine() {
    const name = document.getElementById('newRoutineName').value.trim();
    const emoji = document.getElementById('newRoutineEmoji').value.trim() || '✅';
    if(name && !currentRoutines.find(r => r.name === name)) {
      const newList = [...currentRoutines, {name, emoji}];
      db.ref('settings/routines').set(newList).then(() => {
        document.getElementById('newRoutineName').value = '';
        document.getElementById('newRoutineEmoji').value = '';
        openManageRoutineModal(); // Refresh the list in the modal
      });
    }
  }

  // ... (Remainder of functions: init, renderRoutine, saveWalk, etc. from 1.2.2) ...
</script>
</body>
</html>
