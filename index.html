<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dog Duty</title>
  
  <link rel="icon" type="image/png" href="dogdutyicon.png">
  <link rel="apple-touch-icon" href="dogdutyicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dog Duty">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    /**
     * RESET & BASE STYLES
     */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
    
    #supplyBanner { display: none; background: #b71c1c; color: white; padding: 14px; text-align: center; font-weight: 800; font-size: 16px; border-bottom: 3px solid #ff5252; text-transform: uppercase; }
    main { padding: 12px; display: none; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #333; }
    .brand-area { display: flex; align-items: center; gap: 10px; }
    .brand-area img { height: 30px; width: auto; max-width: 120px; border-radius: 4px; }
    h1 { margin: 0; font-size: 20px; white-space: nowrap; font-weight: 800; letter-spacing: -0.5px; }
    #syncStatus { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #4fc3f7; opacity: 0; transition: opacity 0.3s; }
    #syncStatus.visible { opacity: 1; }
    
    .header-controls { display: flex; gap: 8px; }
    .icon-btn { background: #333; padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; color: #fff; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; }
    .list-container { display: flex; flex-direction: column; gap: 12px; }
    .section-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; margin: 15px 0 5px 5px; }
    
    button.task-btn { width: 100%; text-align: left; font-size: 18px; padding: 20px; border-radius: 18px; border: none; background: #2c2c2c; color: #e0e0e0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.15s ease; }
    button.task-btn.done { background: #2e7d32; color: #fff; }

    .walk-content { display: grid; grid-template-columns: auto 1fr auto; align-items: center; width: 100%; gap: 12px; }
    .add-walk-btn { width: 100%; background: #0277bd; color: white; border: none; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
    .modal-content { background: #1e1e1e; padding: 25px; border-radius: 24px; text-align: center; width: 92%; max-width: 400px; border: 1px solid #333; }
    
    .action-btn { display: block; width: 100%; padding: 16px; font-size: 18px; border-radius: 14px; border: none; background: #2e7d32; color: white; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
    .action-btn.secondary { background: #333; color: #ccc; }
    
    input[type="time"] { width: 100%; display: block; margin: 0 auto 15px auto; padding: 15px; font-size: 28px; border-radius: 14px; border: 2px solid #444; background: #222; color: white; text-align: center; -webkit-appearance: none; }

    .history-month-label { font-size: 11px; color: #4fc3f7; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px 5px; font-weight: bold; }
    .history-week-header { background: #333; padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border: 1px solid #444; }
    .history-week-content { display: none; margin-bottom: 20px; padding-left: 10px; border-left: 2px solid #333; }
    .history-week-content.expanded { display: block; }
    .current-badge { font-size: 10px; color: #4caf50; background: rgba(76, 175, 80, 0.1); padding: 2px 6px; border-radius: 4px; margin-left: 8px; border: 1px solid rgba(76, 175, 80, 0.3); }

    .supply-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #333; }
    .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2e7d32; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #d32f2f; }
    input:checked + .slider:before { transform: translateX(26px); }

    .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
    .helper-text { font-size: 13px; color: #aaa; margin-bottom: 10px; text-align: center; font-style: italic; }
    .version-label { text-align: center; margin-top: 40px; opacity: 0.5; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; padding: 10px; }
    .leaderboard-row { display: flex; justify-content: space-between; padding: 12px; background: #2c2c2c; border-radius: 12px; margin-bottom: 8px; font-weight: bold; }
  </style>
</head>
<body>

<div id="supplyBanner"></div>

<main id="appContent">
  <header>
    <div class="brand-area">
      <img src="logo.png" alt="Logo">
      <h1>DOG DUTY</h1>
      <span id="syncStatus">Syncing...</span>
    </div>
    <div class="header-controls">
      <div class="icon-btn" onclick="openLeaderboardModal()">🏆</div>
      <div class="icon-btn" onclick="confirmSignOut()">👤 <span id="userNameDisplay">...</span></div>
    </div>
  </header>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div class="section-label">Routines</div>
    <div style="font-size:12px; color:#0277bd; cursor:pointer; margin-right:10px;" onclick="openManageRoutineModal()">⚙️ Edit</div>
  </div>
  <div id="routineButtons" class="list-container"></div>

  <div class="section-label">Walks</div>
  <div id="walkList" class="list-container"></div>
  <button class="add-walk-btn" onclick="openWalkModal()">＋ Add Walk</button>

  <div style="margin-top:30px; border-top: 1px solid #333; padding-top:20px;">
    <button class="action-btn secondary" onclick="openSupplyModal()">📦 Manage Supplies</button>
    <button class="action-btn secondary" style="background:#455a64; margin-top:10px;" onclick="openHistoryModal()">📅 View History</button>
  </div>

  <div class="version-label" id="versionDisplay" onclick="window.location.reload(true)"></div>
</main>

<div id="loginModal" class="modal" style="display:flex;">
  <div class="modal-content">
    <img src="dogdutyicon.png" style="height:100px; width:100px; margin-bottom:20px; border-radius:20px;">
    <h2>Family Access</h2>
    <p style="font-size: 14px; color: #888; margin-bottom: 20px;">Please sign in to continue.</p>
    <button class="action-btn" onclick="handleGoogleLogin()" style="background:#4285F4; display:flex; align-items:center; justify-content:center; gap:10px; width:100%;">Sign in with Google</button>
  </div>
</div>

<div id="leaderboardModal" class="modal">
  <div class="modal-content">
    <h2>Leaderboard</h2>
    <div id="leaderboardList" style="text-align: left;"></div>
    <button class="action-btn secondary" style="margin-top:20px;" onclick="closeLeaderboardModal()">Close</button>
  </div>
</div>

<div id="manageRoutineModal" class="modal">
  <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
    <h2>Edit Routines</h2>
    <div id="routineSettingsList" style="text-align:left; margin-bottom:15px;"></div>
    <div class="helper-text">Add task below. Use emoji keyboard for icon!</div>
    <div class="input-group">
      <input type="text" id="newRoutineEmoji" placeholder="🐾" maxlength="2" style="width:60px; padding:15px; border-radius:10px; border:none; background:#333; color:white; text-align:center; font-size:24px; min-height:54px;">
      <input type="text" id="newRoutineName" placeholder="Task Name" style="flex-grow:1; padding:15px; border-radius:10px; border:none; background:#333; color:white; font-size:16px; min-height:54px;">
    </div>
    <button class="action-btn" onclick="addRoutine()">＋ Add New Task</button>
    <button class="action-btn secondary" onclick="closeManageRoutineModal()">Close</button>
  </div>
</div>

<div id="walkModal" class="modal">
  <div class="modal-content">
    <h2 id="walkModalTitle">Log Walk</h2>
    <input type="time" id="walkTimeInput">
    <div id="editSaveArea" style="display:none; margin-bottom:15px;"><button class="action-btn" style="background:#0277bd;" onclick="saveWalk(null)">💾 Save Time Change</button></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <button class="action-btn" onclick="saveWalk('pee')">💦 Pee</button>
      <button class="action-btn" onclick="saveWalk('poop')">💩 Poop</button>
      <button class="action-btn" style="grid-column: span 2;" onclick="saveWalk('both')">💦💩 Both</button>
      <button class="action-btn secondary" style="grid-column: span 2; background:#5d4037; color:white;" onclick="saveWalk('backyard')">🏡 Backyard</button>
    </div>
    <div id="editWalkControls" style="display:none; border-top:1px solid #333; padding-top:10px; margin-top:10px;"><button class="action-btn" style="background:#b71c1c;" onclick="confirmDeleteWalk()">🗑️ Delete Walk</button></div>
    <button class="action-btn secondary" style="margin-top:10px;" onclick="closeWalkModal()">Cancel</button>
  </div>
</div>

<div id="supplyModal" class="modal">
  <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h2 style="margin:0;">Supplies</h2>
      <span style="font-size:12px; color:#0277bd; cursor:pointer;" onclick="openManageSupplyModal()">⚙️ Edit List</span>
    </div>
    <div id="supplyListContainer"></div>
    <button class="action-btn secondary" style="margin-top:20px;" onclick="closeSupplyModal()">Close</button>
  </div>
</div>

<div id="manageSupplyModal" class="modal">
  <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
    <h2>Edit Supply List</h2>
    <div id="supplyEditList" style="text-align:left; margin-bottom:15px;"></div>
    <div class="helper-text">Add item below. Use emoji keyboard for icon!</div>
    <div class="input-group">
      <input type="text" id="newSupplyEmoji" placeholder="🐾" maxlength="2" 
         style="width:60px; padding:15px; border-radius:10px; border:none; background:#333; color:white; text-align:center; font-size:24px; min-height:54px;">
      <input type="text" id="newSupplyName" placeholder="Supply Name" 
         style="flex-grow:1; padding:15px; border-radius:10px; border:none; background:#333; color:white; font-size:16px; min-height:54px;">
    </div>
    <button class="action-btn" onclick="addSupplyItem()">＋ Add New Item</button>
    <button class="action-btn secondary" onclick="closeManageSupplyModal()">Back</button>
  </div>
</div>

<div id="historyModal" class="modal">
  <div class="modal-content" style="max-height: 85vh; display: flex; flex-direction: column;">
    <h2>Activity History</h2>
    <div id="historyList" style="text-align: left; overflow-y: auto; flex-grow: 1; padding-right: 5px;"></div>
    <div style="border-top:1px solid #333; margin-top:10px; padding-top:10px;">
      <button class="action-btn" style="background:#455a64; font-size:14px;" onclick="exportFullHistoryCSV()">📥 Download ALL Data (CSV)</button>
      <button class="action-btn secondary" style="margin-top: 5px;" onclick="closeHistoryModal()">Close</button>
    </div>
  </div>
</div>

<script>
  /**
   * SECTION 1: CONFIGURATION & GLOBAL STATE
   */
  const APP_VERSION = "Version 1.5.3";

  const firebaseConfig = {
    apiKey: "AIzaSyBaIQVgPLcCj4T8-wvZ90L9iKSJHZ_7Srg",
    authDomain: "dog-duty-fe307.firebaseapp.com",
    databaseURL: "https://dog-duty-fe307-default-rtdb.firebaseio.com",
    projectId: "dog-duty-fe307",
    storageBucket: "dog-duty-fe307.firebasestorage.app",
    messagingSenderId: "864273780235",
    appId: "1:864273780235:web:42c82e06afa5deadc1c10e",
    measurementId: "G-C460E5SS3D"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  let userFirstName = "";
  let activeWalks = [];
  let currentRoutines = [];
  let currentSupplies = [];
  let editingWalkId = null;
  let todayKey = "";

  document.getElementById('versionDisplay').textContent = APP_VERSION;

  /**
   * SECTION 2: AUTHENTICATION & INITIALIZATION
   */
  auth.onAuthStateChanged(user => {
    if (user) {
      db.ref(`allowlist/${user.uid}`).once('value').then(snap => {
        if (snap.exists()) {
          userFirstName = user.displayName ? user.displayName.split(' ')[0] : "User";
          document.getElementById('loginModal').style.display = 'none';
          document.getElementById('appContent').style.display = 'block';
          document.getElementById('userNameDisplay').textContent = userFirstName;
          refreshAppState();
          scheduleMidnightRefresh();
        } else {
          alert("Access Denied: UID not authorized.");
          auth.signOut();
        }
      }).catch(err => {
        console.error("Auth error:", err);
        auth.signOut();
      });
    } else {
      document.getElementById('loginModal').style.display = 'flex';
      document.getElementById('appContent').style.display = 'none';
    }
  });

  function refreshAppState() {
    todayKey = getLocalToday();
    init();
  }

  function scheduleMidnightRefresh() {
    const now = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 1);
    setTimeout(() => { refreshAppState(); scheduleMidnightRefresh(); }, midnight.getTime() - now.getTime());
  }

  function init() {
    db.ref('settings/routines').on('value', snap => {
      currentRoutines = snap.val() || [
        {name: 'Breakfast', emoji: '🥣'}, {name: 'Blinds', emoji: '🪟'}, 
        {name: 'Dinner', emoji: '🍽️'}, {name: 'Meds', emoji: '💊'}
      ];
      db.ref(`days/${todayKey}`).on('value', snapshot => {
        const val = snapshot.val() || {};
        renderRoutine(val);
        renderWalks(val.Walks);
      });
    });

    db.ref('settings/supplyList').on('value', snap => {
      currentSupplies = snap.val() || [
        {name: 'Food', emoji: '🥫'}, {name: 'Meds', emoji: '💊'}, {name: 'Treats', emoji: '🦴'}
      ];
      db.ref('supplies').on('value', snapshot => {
        const currentStatus = snapshot.val() || {};
        renderSupplyToggles(currentStatus);
        renderSupplyEditList();
        handleSupplyBanner(currentStatus);
      });
    });
  }

  /**
   * SECTION 3: DATA RENDERING
   */
  function renderRoutine(dayData) {
    const rContainer = document.getElementById('routineButtons');
    rContainer.innerHTML = '';
    currentRoutines.forEach(r => {
      const val = dayData[r.name];
      const btn = document.createElement('button');
      btn.className = `task-btn ${val ? 'done' : ''}`;
      btn.innerHTML = `<span>${r.emoji} ${r.name}</span><small style="opacity:0.7">${val || ''}</small>`;
      btn.onclick = () => {
        if (val && !confirm(`Uncheck "${r.name}"?`)) return;
        setSyncUI(true);
        const timeStr = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        db.ref(`days/${todayKey}/${r.name}`).set(val ? null : `✔ ${timeStr} (${userFirstName})`).then(() => setSyncUI(false));
      };
      rContainer.appendChild(btn);
    });
  }

  function renderWalks(walksJson) {
    const wContainer = document.getElementById('walkList');
    wContainer.innerHTML = '';
    try { activeWalks = walksJson ? JSON.parse(walksJson) : []; } catch(e) { activeWalks = []; }
    
    // THE FIX: Sorting walks chronologically by time
    activeWalks.sort((a, b) => {
        const getMinutes = (timeStr) => {
            const [time, period] = timeStr.split(' ');
            let [h, m] = time.split(':').map(Number);
            if (period === 'PM' && h !== 12) h += 12;
            if (period === 'AM' && h === 12) h = 0;
            return h * 60 + m;
        };
        return getMinutes(a.time) - getMinutes(b.time);
    });

    if(activeWalks.length === 0) { wContainer.innerHTML = '<div style="text-align:center; padding:15px; color:#555;">No walks today</div>'; return; }
    activeWalks.forEach(w => {
      const btn = document.createElement('button');
      btn.className = `task-btn done`;
      btn.innerHTML = `<div class="walk-content"><div>${getTimeEmoji(w.time)} Walk</div><div style="font-size:24px;">${w.note}</div><div><small>✔ ${w.time} (${w.name})</small></div></div>`;
      btn.onclick = () => openWalkModal(w);
      wContainer.appendChild(btn);
    });
  }

  function renderSupplyToggles(supplyStatus) {
    const container = document.getElementById('supplyListContainer');
    container.innerHTML = '';
    currentSupplies.forEach(item => {
      const row = document.createElement('div');
      row.className = 'supply-row';
      row.innerHTML = `
        <span>${item.emoji} ${item.name}</span>
        <label class="switch">
          <input type="checkbox" id="check_${item.name}" ${supplyStatus[item.name] ? 'checked' : ''} onchange="toggleSupply('${item.name}')">
          <span class="slider"></span>
        </label>
      `;
      container.appendChild(row);
    });
  }

  function renderSupplyEditList() {
    const container = document.getElementById('supplyEditList');
    container.innerHTML = '';
    currentSupplies.forEach(item => {
      const div = document.createElement('div');
      div.style.cssText = "display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333; align-items:center;";
      div.innerHTML = `<span>${item.emoji} ${item.name}</span><button onclick="deleteSupplyItem('${item.name}')" style="background:#b71c1c; border:none; color:white; border-radius:5px; padding:5px 10px;">Delete</button>`;
      container.appendChild(div);
    });
  }

  /**
   * SECTION 4: ACTIONS & WRITES
   */
  function toggleSupply(itemName) {
    const isChecked = document.getElementById('check_' + itemName).checked;
    db.ref(`supplies/${itemName}`).set(isChecked);
  }

  function addSupplyItem() {
    const name = document.getElementById('newSupplyName').value.trim();
    const emoji = document.getElementById('newSupplyEmoji').value.trim() || '📦';
    if(name && !currentSupplies.find(s => s.name === name)) {
      const newList = [...currentSupplies, {name, emoji}];
      db.ref('settings/supplyList').set(newList).then(() => {
        document.getElementById('newSupplyName').value = '';
        document.getElementById('newSupplyEmoji').value = '';
      });
    }
  }

  function deleteSupplyItem(name) {
    if(confirm(`Remove "${name}" from supply list?`)) {
      const newList = currentSupplies.filter(s => s.name !== name);
      db.ref('settings/supplyList').set(newList);
      db.ref(`supplies/${name}`).remove();
    }
  }

  function saveWalk(subAction) {
    setSyncUI(true);
    const rawTime = document.getElementById('walkTimeInput').value;
    const [h, m] = rawTime.split(':');
    const finalTime = `${((h % 12) || 12)}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
    const emojiMap = {'pee':'💦','poop':'💩','both':'💦💩','backyard':'🏡'};
    const emoji = subAction ? emojiMap[subAction] : (editingWalkId ? activeWalks.find(x => x.id === editingWalkId).note : '🚶');
    let newWalks = [...activeWalks];
    if(editingWalkId) newWalks = newWalks.map(w => w.id == editingWalkId ? {...w, time: finalTime, note: emoji} : w);
    else newWalks.push({ id: Date.now(), time: finalTime, name: userFirstName, note: emoji });
    db.ref(`days/${todayKey}/Walks`).set(JSON.stringify(newWalks)).then(() => { setSyncUI(false); closeWalkModal(); });
  }

  function addRoutine() {
    const name = document.getElementById('newRoutineName').value.trim();
    const emoji = document.getElementById('newRoutineEmoji').value.trim() || '✅';
    if(name && !currentRoutines.find(r => r.name === name)) {
      db.ref('settings/routines').set([...currentRoutines, {name, emoji}]).then(() => {
        document.getElementById('newRoutineName').value = '';
        document.getElementById('newRoutineEmoji').value = '';
      });
    }
  }

  function deleteRoutineItem(name) {
    if(confirm(`Remove "${name}" from routines?`)) {
      const newList = currentRoutines.filter(r => r.name !== name);
      db.ref('settings/routines').set(newList).then(() => {
          openManageRoutineModal();
      });
    }
  }

  function confirmDeleteWalk() { if (confirm("Delete walk?")) { db.ref(`days/${todayKey}/Walks`).set(JSON.stringify(activeWalks.filter(w => w.id != editingWalkId))).then(() => closeWalkModal()); } }

  /**
   * SECTION 5: MODAL CONTROLS
   */
  function openWalkModal(w = null) {
    editingWalkId = w ? w.id : null;
    if (w) {
      document.getElementById('walkTimeInput').value = convertTo24(w.time);
    } else {
      const now = new Date();
      document.getElementById('walkTimeInput').value = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }
    document.getElementById('walkModal').style.display = 'flex';
    document.getElementById('editSaveArea').style.display = w ? 'block' : 'none';
    document.getElementById('editWalkControls').style.display = w ? 'block' : 'none';
    document.getElementById('walkModalTitle').textContent = w ? "Edit Walk" : "Log Walk";
  }
  function closeWalkModal() { document.getElementById('walkModal').style.display = 'none'; }
  function openSupplyModal() { document.getElementById('supplyModal').style.display = 'flex'; }
  function closeSupplyModal() { document.getElementById('supplyModal').style.display = 'none'; }
  function openManageSupplyModal() { document.getElementById('manageSupplyModal').style.display = 'flex'; }
  function closeManageSupplyModal() { document.getElementById('manageSupplyModal').style.display = 'none'; }
  
  function openManageRoutineModal() {
    const list = document.getElementById('routineSettingsList');
    list.innerHTML = '';
    currentRoutines.forEach(r => {
      const div = document.createElement('div');
      div.style.cssText = "display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333; align-items:center;";
      div.innerHTML = `<span>${r.emoji} ${r.name}</span><button onclick="deleteRoutineItem('${r.name}')" style="background:#b71c1c; border:none; color:white; border-radius:5px; padding:5px 10px;">Delete</button>`;
      list.appendChild(div);
    });
    document.getElementById('manageRoutineModal').style.display = 'flex';
  }
  
  function closeManageRoutineModal() { document.getElementById('manageRoutineModal').style.display = 'none'; }
  function openHistoryModal() { document.getElementById('historyModal').style.display = 'flex'; loadHistory(); }
  function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
  function openLeaderboardModal() {
    const list = document.getElementById('leaderboardList');
    list.innerHTML = '...';
    document.getElementById('leaderboardModal').style.display = 'flex';
    db.ref('days').limitToLast(7).once('value', snapshot => {
      const data = snapshot.val() || {};
      const scores = {};
      Object.values(data).forEach(day => {
        Object.entries(day).forEach(([key, val]) => {
          if (key !== "Walks" && typeof val === 'string' && val.includes('(')) {
            const name = val.split('(')[1].replace(')', '');
            scores[name] = (scores[name] || 0) + 1;
          }
        });
        if (day.Walks) {
          try { JSON.parse(day.Walks).forEach(w => { scores[w.name] = (scores[w.name] || 0) + 1; }); } catch(e) {}
        }
      });
      const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
      list.innerHTML = '';
      sorted.forEach(([name, score], index) => {
        const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
        const div = document.createElement('div');
        div.className = 'leaderboard-row';
        div.innerHTML = `<span>${medal} ${name}</span><span>${score} pts</span>`;
        list.appendChild(div);
      });
    });
  }
  function closeLeaderboardModal() { document.getElementById('leaderboardModal').style.display = 'none'; }

  /**
   * SECTION 6: UTILITIES & HISTORY
   */
  function handleSupplyBanner(status) {
    const low = [];
    Object.entries(status).forEach(([name, isLow]) => { if(isLow) low.push(name.toUpperCase()); });
    const b = document.getElementById('supplyBanner');
    b.style.display = low.length > 0 ? 'block' : 'none';
    b.innerHTML = low.length > 0 ? `⚠️ LOW ${low.join(' & ')} ⚠️` : '';
  }

  function loadHistory() {
    const historyList = document.getElementById('historyList');
    historyList.innerHTML = '...';
    db.ref('days').limitToLast(30).once('value', snapshot => {
      const allDays = snapshot.val() || {};
      historyList.innerHTML = '';
      const sortedKeys = Object.keys(allDays).sort().reverse();
      const hierarchy = {};
      sortedKeys.forEach(dateKey => {
        const d = new Date(dateKey + 'T00:00:00');
        const monthLabel = d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
        const sunday = new Date(new Date(d).setDate(d.getDate() - d.getDay())).toISOString().split('T')[0];
        if (!hierarchy[monthLabel]) hierarchy[monthLabel] = {};
        if (!hierarchy[monthLabel][sunday]) hierarchy[monthLabel][sunday] = [];
        hierarchy[monthLabel][sunday].push(dateKey);
      });
      let first = true;
      Object.entries(hierarchy).forEach(([month, weeks]) => {
        const mH = document.createElement('div'); mH.className = 'history-month-label'; mH.textContent = month;
        historyList.appendChild(mH);
        Object.keys(weeks).sort().reverse().forEach(sKey => {
          const isExp = first; first = false;
          const wD = document.createElement('div');
          const hD = document.createElement('div'); hD.className = 'history-week-header';
          hD.innerHTML = `<div>Week of ${sKey} ${isExp ? '<span class="current-badge">(Current)</span>' : ''}</div><span>${isExp ? '▼':'▶'}</span>`;
          const cD = document.createElement('div'); cD.className = `history-week-content ${isExp ? 'expanded':''}`;
          hD.onclick = () => { cD.classList.toggle('expanded'); hD.querySelector('span').textContent = cD.classList.contains('expanded') ? '▼':'▶'; };
          weeks[sKey].forEach(dk => {
            const data = allDays[dk];
            const sec = document.createElement('div');
            sec.style.cssText = "margin-bottom:10px; padding:10px; background:#252525; border-radius:10px;";
            let rts = []; Object.entries(data).forEach(([k, v]) => { if(k !== "Walks" && typeof v === 'string') rts.push(`<span style="font-size:11px; margin-right:5px;">${k}: ${v.split(' (')[0]}</span>`); });
            let wks = []; if(data.Walks) JSON.parse(data.Walks).forEach(w => wks.push(`${w.note} ${w.time}`));
            sec.innerHTML = `<div style="color:#4fc3f7; font-size:12px;">${dk}</div><div style="font-size:11px;">${rts.join(' ')}</div><div style="font-size:11px; opacity:0.6;">${wks.join(', ')}</div>`;
            cD.appendChild(sec);
          });
          wD.appendChild(hD); wD.appendChild(cD); historyList.appendChild(wD);
        });
      });
    });
  }

  function exportFullHistoryCSV() {
    db.ref('days').once('value').then(snap => {
      const data = snap.val() || {};
      const rows = [["Date", "Type", "Event", "Time", "User"]];
      Object.keys(data).sort().reverse().forEach(date => {
        Object.entries(data[date]).forEach(([k,v]) => {
          if(k === "Walks") { JSON.parse(v).forEach(w => rows.push([date, "Walk", w.note, w.time, w.name])); }
          else if(typeof v === 'string') { rows.push([date, "Routine", k, v.split(' (')[0].replace('✔ ',''), v.split('(')[1].replace(')','')]); }
        });
      });
      const csv = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
      const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv));
      link.setAttribute("download", "dog_duty_history.csv"); document.body.appendChild(link); link.click();
    });
  }

  function getLocalToday() { return (new Date(Date.now() - (new Date()).getTimezoneOffset() * 60000)).toISOString().split('T')[0]; }
  function getTimeEmoji(t) { return t.includes('PM') ? '🌇' : '🌅'; }
  function setSyncUI(s) { document.getElementById('syncStatus').classList.toggle('visible', s); }
  function handleGoogleLogin() { auth.signInWithPopup(provider); }
  function confirmSignOut() { if(confirm("Sign out?")) auth.signOut().then(() => window.location.reload()); }
  function convertTo24(timeStr) {
    const [time, period] = timeStr.split(' ');
    let [h, m] = time.split(':');
    if (period === 'PM' && h !== '12') h = parseInt(h) + 12;
    if (period === 'AM' && h === '12') h = '00';
    return `${h.toString().padStart(2, '0')}:${m}`;
  }
