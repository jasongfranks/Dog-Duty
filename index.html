<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dog Duty</title>
  
  <link rel="icon" type="image/png" href="dogdutyicon.png">
  <link rel="apple-touch-icon" href="dogdutyicon.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
    
    /* Fixed High-Visibility Banner */
    #supplyBanner { 
      display: none; 
      background: #d32f2f; 
      color: white; 
      padding: 16px; 
      text-align: center; 
      font-weight: 900; 
      font-size: 18px; 
      border-bottom: 4px solid #ff5252; 
      text-transform: uppercase; 
      position: sticky;
      top: 0;
      z-index: 9999;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    main { padding: 12px; display: none; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 10px; padding-bottom: 10px; border-bottom: 1px solid #333; }
    .brand-area { display: flex; align-items: center; gap: 10px; }
    .brand-area img { height: 30px; width: auto; border-radius: 4px; }
    h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    
    #syncStatus { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #4fc3f7; opacity: 0; transition: opacity 0.3s; }
    #syncStatus.visible { opacity: 1; }
    
    .icon-btn { background: #333; padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; color: #fff; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; }
    .list-container { display: flex; flex-direction: column; gap: 12px; }
    .section-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; margin: 15px 0 5px 5px; }
    
    button.task-btn { width: 100%; text-align: left; font-size: 18px; padding: 20px; border-radius: 18px; border: none; background: #2c2c2c; color: #e0e0e0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.15s ease; }
    button.task-btn.done { background: #2e7d32; color: #fff; }

    .walk-content { display: grid; grid-template-columns: auto 1fr auto; align-items: center; width: 100%; gap: 12px; }
    .walk-left { text-align: left; font-size: 18px; }
    .walk-center { text-align: left; font-size: 24px; }
    
    .add-walk-btn { width: 100%; background: #0277bd; color: white; border: none; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(10px); }
    .modal-content { background: #1e1e1e; padding: 25px; border-radius: 24px; text-align: center; width: 92%; max-width: 400px; border: 1px solid #333; }
    
    .action-btn { display: block; width: 100%; padding: 16px; font-size: 18px; border-radius: 14px; border: none; background: #2e7d32; color: white; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
    .action-btn.secondary { background: #333; color: #ccc; }
    
    input[type="time"] { width: 100%; margin-bottom: 15px; padding: 15px; font-size: 28px; border-radius: 14px; border: 2px solid #444; background: #222; color: white; text-align: center; }

    .supply-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 10px; border-bottom: 1px solid #333; }
    .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2e7d32; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #d32f2f; }
    input:checked + .slider:before { transform: translateX(26px); }

    .version-label { text-align: center; margin-top: 40px; opacity: 0.3; font-size: 10px; cursor: pointer; padding: 20px; }
  </style>
</head>
<body>

<div id="supplyBanner"></div>

<main id="appContent">
  <header>
    <div class="brand-area">
      <img src="logo.png" alt="Logo">
      <h1>DOG DUTY</h1>
      <span id="syncStatus">Syncing...</span>
    </div>
    <div class="icon-btn" onclick="confirmSignOut()">👤 <span id="userNameDisplay">...</span></div>
  </header>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div class="section-label">Routines</div>
    <div style="font-size:12px; color:#0277bd; cursor:pointer;" onclick="openManageRoutineModal()">⚙️ Edit</div>
  </div>
  <div id="routineButtons" class="list-container"></div>

  <div class="section-label">Walks</div>
  <div id="walkList" class="list-container"></div>
  <button class="add-walk-btn" onclick="openWalkModal()">＋ Add Walk</button>

  <div style="margin-top:30px; border-top: 1px solid #333; padding-top:20px;">
    <button class="action-btn secondary" onclick="openSupplyModal()">📦 Manage Supplies</button>
    <button class="action-btn secondary" style="background:#455a64;" onclick="openHistoryModal()">📅 View History</button>
  </div>

  <div class="version-label" onclick="window.location.reload(true)">Version 1.3.0</div>
</main>

<div id="loginModal" class="modal" style="display:flex;">
  <div class="modal-content">
    <img src="dogdutyicon.png" style="height:100px; width:100px; margin-bottom:20px; border-radius:20px;">
    <h2>Family Access</h2>
    <button class="action-btn" onclick="handleGoogleLogin()" style="background:#4285F4;">Sign in with Google</button>
  </div>
</div>

<div id="supplyModal" class="modal">
  <div class="modal-content">
    <h2>Supplies Low?</h2>
    <p style="color:#aaa; font-size:14px; margin-bottom:20px;">Turn ON to show red alert banner</p>
    <div class="supply-row"><span>🥫 Food</span><label class="switch"><input type="checkbox" id="checkFood" onchange="setSupplies('Food')"><span class="slider"></span></label></div>
    <div class="supply-row"><span>💊 Meds</span><label class="switch"><input type="checkbox" id="checkMeds" onchange="setSupplies('Meds')"><span class="slider"></span></label></div>
    <div class="supply-row"><span>🦴 Treats</span><label class="switch"><input type="checkbox" id="checkTreats" onchange="setSupplies('Treats')"><span class="slider"></span></label></div>
    <button class="action-btn secondary" style="margin-top:20px;" onclick="closeSupplyModal()">Close</button>
  </div>
</div>

<div id="walkModal" class="modal">
  <div class="modal-content">
    <h2 id="walkModalTitle">Log Walk</h2>
    <input type="time" id="walkTimeInput">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <button class="action-btn" onclick="saveWalk('pee')">💦 Pee</button>
      <button class="action-btn" onclick="saveWalk('poop')">💩 Poop</button>
      <button class="action-btn" style="grid-column: span 2;" onclick="saveWalk('both')">💦💩 Both</button>
      <button class="action-btn secondary" style="grid-column: span 2; background:#5d4037;" onclick="saveWalk('backyard')">🏡 Backyard</button>
    </div>
    <button class="action-btn secondary" style="margin-top:10px;" onclick="closeWalkModal()">Cancel</button>
  </div>
</div>

<div id="historyModal" class="modal"><div class="modal-content"><h2 style="margin-top:0">History</h2><div id="historyList" style="text-align:left; max-height:60vh; overflow-y:auto;"></div><button class="action-btn secondary" onclick="closeHistoryModal()">Close</button></div></div>
<div id="manageRoutineModal" class="modal"><div class="modal-content"><h2>Edit Tasks</h2><div id="routineSettingsList" style="text-align:left; margin-bottom:15px;"></div><button class="action-btn secondary" onclick="closeManageRoutineModal()">Close</button></div></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBaIQVgPLcCj4T8-wvZ90L9iKSJHZ_7Srg",
    authDomain: "dog-duty-fe307.firebaseapp.com",
    databaseURL: "https://dog-duty-fe307-default-rtdb.firebaseio.com",
    projectId: "dog-duty-fe307",
    storageBucket: "dog-duty-fe307.firebasestorage.app",
    messagingSenderId: "864273780235",
    appId: "1:864273780235:web:42c82e06afa5deadc1c10e",
    measurementId: "G-C460E5SS3D"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  function getLocalToday() {
    const now = new Date();
    const offset = now.getTimezoneOffset() * 60000;
    return (new Date(now - offset)).toISOString().split('T')[0];
  }
  const todayKey = getLocalToday();

  let userFirstName = "", activeWalks = [], currentRoutines = [], editingWalkId = null;

  auth.onAuthStateChanged(user => {
    if (user) {
      const email = user.email.toLowerCase().replace(/\./g, ',');
      db.ref(`allowlist/${email}`).once('value').then(snap => {
        if (snap.exists()) {
          userFirstName = user.displayName ? user.displayName.split(' ')[0] : "User";
          document.getElementById('loginModal').style.display = 'none';
          document.getElementById('appContent').style.display = 'block';
          document.getElementById('userNameDisplay').textContent = userFirstName;
          init();
        } else { alert("Access Denied"); auth.signOut(); }
      });
    } else { document.getElementById('loginModal').style.display = 'flex'; }
  });

  function init() {
    db.ref('settings/routines').on('value', snap => {
      currentRoutines = snap.val() || [{name:'Breakfast', emoji:'🥣'}, {name:'Dinner', emoji:'🍽️'}];
      db.ref(`days/${todayKey}`).on('value', snapshot => {
        const val = snapshot.val() || {};
        renderRoutine(val);
        renderWalks(val.Walks);
      });
    });
    // Listen for Supply changes
    db.ref('supplies').on('value', snapshot => handleSupplyBanner(snapshot.val() || {}));
  }

  function handleSupplyBanner(items) {
    const low = [];
    if(items.Food) low.push('FOOD');
    if(items.Meds) low.push('MEDS');
    if(items.Treats) low.push('TREATS');
    
    const banner = document.getElementById('supplyBanner');
    if (banner) {
      if (low.length > 0) {
        banner.style.display = 'block';
        banner.innerHTML = `⚠️ LOW SUPPLY: ${low.join(' & ')} ⚠️`;
      } else {
        banner.style.display = 'none';
      }
    }

    // Sync Checkboxes if modal is open
    ['Food', 'Meds', 'Treats'].forEach(item => {
      const el = document.getElementById('check' + item);
      if (el) el.checked = !!items[item];
    });
  }

  function renderRoutine(dayData) {
    const rContainer = document.getElementById('routineButtons');
    rContainer.innerHTML = '';
    currentRoutines.forEach(r => {
      const val = dayData[r.name];
      const btn = document.createElement('button');
      btn.className = `task-btn ${val ? 'done' : ''}`;
      btn.innerHTML = `<span>${r.emoji} ${r.name}</span><small>${val || ''}</small>`;
      btn.onclick = () => {
        if (val && !confirm(`Uncheck "${r.name}"?`)) return;
        setSyncUI(true);
        const timeStr = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        db.ref(`days/${todayKey}/${r.name}`).set(val ? null : `✔ ${timeStr} (${userFirstName})`).then(() => setSyncUI(false));
      };
      rContainer.appendChild(btn);
    });
  }

  function renderWalks(walksJson) {
    const wContainer = document.getElementById('walkList');
    wContainer.innerHTML = '';
    try { activeWalks = walksJson ? JSON.parse(walksJson) : []; } catch(e) { activeWalks = []; }
    activeWalks.sort((a,b) => a.id - b.id);
    if(activeWalks.length === 0) { wContainer.innerHTML = '<p style="text-align:center;color:#555">No walks logged</p>'; return; }
    activeWalks.forEach(w => {
      const btn = document.createElement('button');
      btn.className = 'task-btn done';
      btn.innerHTML = `<div class="walk-content"><div class="walk-left">🚶</div><div class="walk-center">${w.note}</div><div><small>✔ ${w.time} (${w.name})</small></div></div>`;
      wContainer.appendChild(btn);
    });
  }

  function saveWalk(type) {
    setSyncUI(true);
    const rawTime = document.getElementById('walkTimeInput').value;
    const [h, m] = rawTime.split(':');
    const finalTime = `${((h % 12) || 12)}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
    const emojiMap = {'pee':'💦','poop':'💩','both':'💦💩','backyard':'🏡'};
    activeWalks.push({ id: Date.now(), time: finalTime, name: userFirstName, note: emojiMap[type] });
    db.ref(`days/${todayKey}/Walks`).set(JSON.stringify(activeWalks)).then(() => { setSyncUI(false); closeWalkModal(); });
  }

  function setSyncUI(syncing) { document.getElementById('syncStatus').classList.toggle('visible', syncing); }
  function setSupplies(item) { db.ref(`supplies/${item}`).set(document.getElementById('check' + item).checked); }
  function openSupplyModal() { document.getElementById('supplyModal').style.display = 'flex'; }
  function closeSupplyModal() { document.getElementById('supplyModal').style.display = 'none'; }
  function openWalkModal() { 
    const now = new Date();
    document.getElementById('walkTimeInput').value = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    document.getElementById('walkModal').style.display = 'flex'; 
  }
  function closeWalkModal() { document.getElementById('walkModal').style.display = 'none'; }
  function handleGoogleLogin() { auth.signInWithPopup(provider); }
  function confirmSignOut() { if(confirm("Sign out?")) auth.signOut().then(() => window.location.reload()); }
  function openHistoryModal() { document.getElementById('historyModal').style.display = 'flex'; }
  function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
  function openManageRoutineModal() { document.getElementById('manageRoutineModal').style.display = 'flex'; }
  function closeManageRoutineModal() { document.getElementById('manageRoutineModal').style.display = 'none'; }
</script>
</body>
</html>
